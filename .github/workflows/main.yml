name: Build KINO APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: |
          ./gradlew assembleDebug --stacktrace > build_output.txt 2>&1 || echo "BUILD_FAILED=true" >> $GITHUB_ENV

      - name: Print Only Errors and Warnings
        if: always()
        run: |
          echo "=== COMPILATION ERRORS ==="
          grep -E "^e:|error:|FAILED|What went wrong|Caused by:" build_output.txt || echo "No specific errors found in grep, check full log."
          echo "=== END ERRORS ==="

      - name: Fail job if build failed
        if: env.BUILD_FAILED == 'true'
        run: exit 1

      - name: Upload APK Artifact
        if: env.BUILD_FAILED != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: kino-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
